<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Player | EduStream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d' }
                    }
                }
            }
        };

        const applyTheme = (theme) => {
            if (theme === 'dark') document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
            localStorage.setItem('theme', theme);
        };
        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        applyTheme(savedTheme);
    </script>
    <style>
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: #000;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
        }
        #youtube-player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* Invisible overlay to block YouTube native interaction */
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% - 60px); /* Leave room for controls if needed, but we overlay them too */
            z-index: 10;
            background: transparent;
            cursor: default;
        }
        
        /* Custom Controls Bar */
        .custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            z-index: 30;
            display: flex;
            flex-direction: column;
            padding: 0 20px 10px 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .video-container:hover .custom-controls {
            opacity: 1;
        }

        /* Progress Bar Styling */
        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            cursor: pointer;
            margin-bottom: 10px;
            position: relative;
            transition: height 0.1s;
        }
        .progress-container:hover { height: 6px; }
        .progress-bar {
            height: 100%;
            background: #22c55e;
            width: 0%;
            position: relative;
        }

        /* Protection Watermark */
        #watermark {
            position: absolute;
            z-index: 20;
            pointer-events: none;
            user-select: none;
            opacity: 0.25;
            font-size: 14px;
            font-weight: 800;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            white-space: nowrap;
            transition: all 5s linear;
        }

        input[type=range] {
            accent-color: #22c55e;
        }

        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fade-in 0.6s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen font-sans text-slate-900 dark:text-slate-100">

    <header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200/60 dark:border-slate-800/60 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="goBack()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <span class="font-bold text-sm tracking-tight hidden sm:block">Back to Curriculum</span>
            </div>
            <div class="flex items-center gap-4">
                <span id="video-title" class="text-sm font-medium text-slate-500 truncate max-w-[200px] sm:max-w-md">Loading lesson...</span>
            </div>
            <div class="w-10"></div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-12 animate-fade-in">
        <div id="player-wrapper" class="video-container group">
            <div id="youtube-player"></div>
            
            <!-- Blocking Interaction Overlay -->
            <div class="video-overlay" id="player-shield"></div>
            
            <!-- Protection Watermark -->
            <div id="watermark">User ID Tracking...</div>

            <!-- Custom Controls -->
            <div class="custom-controls">
                <!-- Progress Scrubber -->
                <div class="progress-container" id="progress-container" onclick="seek(event)">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>

                <div class="flex items-center justify-between text-white">
                    <div class="flex items-center gap-4">
                        <!-- Play/Pause -->
                        <button onclick="togglePlay()" class="hover:text-brand-500 transition-colors">
                            <svg id="ctrl-play-icon" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            <svg id="ctrl-pause-icon" class="w-6 h-6 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        </button>

                        <!-- Volume -->
                        <div class="flex items-center gap-2 group/vol">
                            <button onclick="toggleMute()" class="hover:text-brand-500 transition-colors">
                                <svg id="vol-high" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/></svg>
                                <svg id="vol-mute" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" /></svg>
                            </button>
                            <input type="range" id="vol-slider" min="0" max="100" value="100" oninput="setVolume(this.value)" class="w-0 group-hover/vol:w-20 transition-all overflow-hidden h-1">
                        </div>

                        <!-- Time -->
                        <span class="text-xs font-mono"><span id="curr-time">0:00</span> / <span id="dur-time">0:00</span></span>
                    </div>

                    <div class="flex items-center gap-5">
                        <!-- Speed -->
                        <select onchange="setPlaybackSpeed(this.value)" class="bg-transparent text-xs font-bold border-none outline-none cursor-pointer hover:text-brand-500">
                            <option value="0.5" class="bg-slate-900">0.5x</option>
                            <option value="1" selected class="bg-slate-900">1x</option>
                            <option value="1.5" class="bg-slate-900">1.5x</option>
                            <option value="2" class="bg-slate-900">2x</option>
                        </select>

                        <!-- Fullscreen -->
                        <button onclick="toggleFullscreen()" class="hover:text-brand-500 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-8 flex flex-col md:flex-row md:items-center justify-between gap-6">
            <div>
                <h1 id="display-title" class="text-3xl font-black tracking-tight text-slate-900 dark:text-white">Video Lesson</h1>
                <div class="flex items-center gap-2 mt-2">
                    <span id="lesson-id-badge" class="px-2 py-0.5 bg-slate-200 dark:bg-slate-800 rounded text-[10px] font-bold uppercase tracking-wider hidden">ID: ...</span>
                    <p class="text-slate-500 dark:text-slate-400 font-medium">Internal Secure Learning Player • EduStream v2.0</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const CONFIG = {
            SUPABASE_URL: 'https://pkqpvnrtxtqlngwtfnhy.supabase.co',
            SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrcXB2bnJ0eHRxbG5nd3Rmbmh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzNzQxNTUsImV4cCI6MjA4NTk1MDE1NX0.wrYYlIzt1slOXkbUAqAaSI1bA9xJ2N8QhNHSRJIkZR0',
            SHEET_ID: '1qH9wY5Zf7eXW_uNlB_p2W1zB6yLpQ_Qy_X_f_f_f_f_f', // Placeholder: Update with your actual Sheet ID
            API_KEY: '' // Empty as per instructions, provided at runtime
        };

        const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('url');
        const courseId = urlParams.get('id');

        let player;
        let userEmail = "Guest Student";
        let isMuted = false;

        function extractVideoId(url) {
            if (!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        const videoId = extractVideoId(videoUrl);

        /**
         * Fetches Lesson ID from Column I (9th column) in "Sheet3"
         */
        async function fetchLessonIdFromSheet() {
            if (!videoUrl) return;

            try {
                // Fetch all data from Sheet3
                const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/Sheet3!A:I?key=${CONFIG.API_KEY}`);
                const data = await response.json();
                
                if (data.values) {
                    // Match row by videoUrl (usually in column A or similar)
                    // We search through all rows to find the one matching current videoUrl
                    const row = data.values.find(r => r.includes(videoUrl));
                    if (row && row[8]) { // Column I is index 8
                        const lessonId = row[8];
                        const badge = document.getElementById('lesson-id-badge');
                        badge.innerText = `ID: ${lessonId}`;
                        badge.classList.remove('hidden');
                    }
                }
            } catch (err) {
                console.error("Error fetching lesson ID from sheet:", err);
            }
        }

        async function checkAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) return window.location.assign('login.html');
            userEmail = session.user.email;
            initWatermark();
            fetchLessonIdFromSheet(); // Call sheet lookup after auth
        }

        function initWatermark() {
            const watermark = document.getElementById('watermark');
            watermark.innerText = userEmail + " - Internal Use Only";
            
            function moveWatermark() {
                const container = document.getElementById('player-wrapper');
                const maxX = container.clientWidth - watermark.clientWidth;
                const maxY = container.clientHeight - watermark.clientHeight - 70; // Avoid controls
                
                const randomX = Math.floor(Math.random() * maxX);
                const randomY = Math.floor(Math.random() * maxY);
                
                watermark.style.left = randomX + 'px';
                watermark.style.top = randomY + 'px';
            }
            moveWatermark();
            setInterval(moveWatermark, 8000);
        }

        // YouTube API
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            if (!videoId) return;

            player = new YT.Player('youtube-player', {
                videoId: videoId,
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'disablekb': 1,
                    'rel': 0,
                    'modestbranding': 1,
                    'fs': 0,
                    'iv_load_policy': 3
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function formatTime(time) {
            time = Math.round(time);
            const minutes = Math.floor(time / 60);
            const seconds = time % 60;
            return `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        }

        function onPlayerReady(event) {
            const data = event.target.getVideoData();
            document.getElementById('video-title').innerText = data.title;
            document.getElementById('display-title').innerText = data.title;
            document.getElementById('dur-time').innerText = formatTime(player.getDuration());
            
            // Start progress update loop
            setInterval(updateProgressBar, 500);
        }

        function onPlayerStateChange(event) {
            const playIcon = document.getElementById('ctrl-play-icon');
            const pauseIcon = document.getElementById('ctrl-pause-icon');
            
            if (event.data == YT.PlayerState.PLAYING) {
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
            } else {
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
            }
        }

        function updateProgressBar() {
            if (player && player.getCurrentTime) {
                const currTime = player.getCurrentTime();
                const duration = player.getDuration();
                const percent = (currTime / duration) * 100;
                
                document.getElementById('progress-bar').style.width = percent + '%';
                document.getElementById('curr-time').innerText = formatTime(currTime);
            }
        }

        function togglePlay() {
            const state = player.getPlayerState();
            if (state === YT.PlayerState.PLAYING) player.pauseVideo();
            else player.playVideo();
        }

        function seek(event) {
            const rect = document.getElementById('progress-container').getBoundingClientRect();
            const pos = (event.clientX - rect.left) / rect.width;
            player.seekTo(pos * player.getDuration());
        }

        function setVolume(val) {
            player.setVolume(val);
            player.unMute();
            isMuted = false;
            updateVolIcons();
        }

        function toggleMute() {
            if (player.isMuted()) {
                player.unMute();
                isMuted = false;
            } else {
                player.mute();
                isMuted = true;
            }
            updateVolIcons();
        }

        function updateVolIcons() {
            document.getElementById('vol-high').classList.toggle('hidden', isMuted);
            document.getElementById('vol-mute').classList.toggle('hidden', !isMuted);
        }

        function setPlaybackSpeed(speed) {
            player.setPlaybackRate(parseFloat(speed));
        }

        function toggleFullscreen() {
            const elem = document.getElementById('player-wrapper');
            if (!document.fullscreenElement) {
                elem.requestFullscreen().catch(err => {
                    console.error(`Error attempting to enable full-screen mode: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        function goBack() {
            if (courseId) window.location.assign(`curriculum.html?id=${courseId}`);
            else window.history.back();
        }

        checkAuth();
    </script>
</body>
</html>
