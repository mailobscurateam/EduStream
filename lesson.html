<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lesson Player | EduStream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d' }
                    }
                }
            }
        };
    </script>
    <style>
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: #000;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            -webkit-tap-highlight-color: transparent;
        }

        /* Essential for fullscreen visibility */
        .video-container:fullscreen { border-radius: 0; }
        .video-container:-webkit-full-screen { border-radius: 0; }

        #youtube-player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: transparent;
        }
        
        .custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 9999; /* Highest priority */
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            display: flex;
            flex-direction: column;
            padding: 20px 20px calc(15px + env(safe-area-inset-bottom)) 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        /* Show controls on hover or when container is active (mobile tap) */
        .video-container:hover .custom-controls,
        .video-container.active-controls .custom-controls {
            opacity: 1;
            pointer-events: auto;
        }

        .progress-container {
            width: 100%;
            height: 12px;
            display: flex;
            align-items: center;
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        .progress-bg {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: #22c55e;
            width: 0%;
            border-radius: 4px;
            position: relative;
        }

        #watermark {
            position: absolute;
            z-index: 20;
            pointer-events: none;
            user-select: none;
            opacity: 0.3;
            font-size: 12px;
            font-weight: 800;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            white-space: nowrap;
        }

        input[type=range] { accent-color: #22c55e; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen font-sans text-slate-900 dark:text-slate-100">

    <header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200/60 dark:border-slate-800/60 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <button onclick="goBack()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <span id="video-title" class="text-sm font-semibold truncate max-w-[200px] sm:max-w-md">Loading lesson...</span>
            <div class="w-8"></div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 py-8">
        <div id="player-wrapper" class="video-container group">
            <div id="youtube-player"></div>
            <!-- Large interactive area for play/pause and showing controls on mobile -->
            <div class="video-overlay" id="player-shield"></div>
            <div id="watermark">User ID Tracking...</div>

            <div class="custom-controls">
                <div class="progress-container" id="progress-container">
                    <div class="progress-bg">
                        <div class="progress-bar" id="progress-bar"></div>
                    </div>
                </div>

                <div class="flex items-center justify-between text-white">
                    <div class="flex items-center gap-4">
                        <button id="main-play-btn" class="hover:text-brand-500">
                            <svg id="ctrl-play-icon" class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            <svg id="ctrl-pause-icon" class="w-8 h-8 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        </button>

                        <div class="flex items-center gap-2">
                            <button id="mute-btn" class="hover:text-brand-500">
                                <svg id="vol-high" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/></svg>
                                <svg id="vol-mute" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" /></svg>
                            </button>
                            <span class="text-xs font-mono"><span id="curr-time">0:00</span> / <span id="dur-time">0:00</span></span>
                        </div>
                    </div>

                    <div class="flex items-center gap-4">
                        <select id="speed-select" class="bg-transparent text-xs font-bold border-none outline-none cursor-pointer">
                            <option value="0.5" class="bg-black">0.5x</option>
                            <option value="1" selected class="bg-black">1x</option>
                            <option value="1.5" class="bg-black">1.5x</option>
                            <option value="2" class="bg-black">2x</option>
                        </select>
                        <button id="fs-btn" class="hover:text-brand-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-8">
            <h1 id="display-title" class="text-2xl sm:text-3xl font-black tracking-tight leading-tight">Loading Lesson...</h1>
            <p class="text-slate-500 mt-2 font-medium">EduStream Secure Learning Player v2.1</p>
        </div>
    </main>

    <script>
        const CONFIG = {
            SUPABASE_URL: 'https://pkqpvnrtxtqlngwtfnhy.supabase.co',
            SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrcXB2bnJ0eHRxbG5nd3Rmbmh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzNzQxNTUsImV4cCI6MjA4NTk1MDE1NX0.wrYYlIzt1slOXkbUAqAaSI1bA9xJ2N8QhNHSRJIkZR0',
            SHEET_ID: '1_ALK5Bkz-D0LIia1fLc_NmA12Zm8KRylJNYjnfhPezM',
            API_KEY: 'AIzaSyDzdiDMtiY250DS-lDuZeIZOocw9oqMlhM'
        };

        const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let player, userEmail = "Guest", isMuted = false, controlTimer;

        // UI Helpers
        const toggleControls = (show) => {
            const wrap = document.getElementById('player-wrapper');
            if (show) {
                wrap.classList.add('active-controls');
                clearTimeout(controlTimer);
                controlTimer = setTimeout(() => {
                    if (player?.getPlayerState() === 1) wrap.classList.remove('active-controls');
                }, 3000);
            } else {
                wrap.classList.remove('active-controls');
            }
        };

        // Player Actions
        function onYouTubeIframeAPIReady() {
            fetchLessonDetails();
        }

        async function fetchLessonDetails() {
            const id = new URLSearchParams(window.location.search).get('id');
            if (!id) return;
            try {
                const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/Sheet3!A:I?key=${CONFIG.API_KEY}`);
                const data = await res.json();
                const row = data.values?.find(r => r[8] === id);
                if (row) {
                    document.getElementById('display-title').innerText = row[1];
                    initPlayer(extractId(row[4]));
                }
            } catch (e) { console.error(e); }
        }

        function extractId(url) {
            const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
            return match && match[2].length === 11 ? match[2] : null;
        }

        function initPlayer(videoId) {
            player = new YT.Player('youtube-player', {
                videoId: videoId,
                playerVars: { 'autoplay': 0, 'controls': 0, 'disablekb': 1, 'rel': 0, 'playsinline': 1 },
                events: {
                    'onReady': (e) => {
                        document.getElementById('video-title').innerText = e.target.getVideoData().title;
                        document.getElementById('dur-time').innerText = formatTime(player.getDuration());
                        setInterval(updateProgress, 500);
                    },
                    'onStateChange': (e) => {
                        const playing = e.data === 1;
                        document.getElementById('ctrl-play-icon').classList.toggle('hidden', playing);
                        document.getElementById('ctrl-pause-icon').classList.toggle('hidden', !playing);
                    }
                }
            });
        }

        function updateProgress() {
            if (player?.getCurrentTime) {
                const cur = player.getCurrentTime(), dur = player.getDuration();
                document.getElementById('progress-bar').style.width = (cur / dur * 100) + '%';
                document.getElementById('curr-time').innerText = formatTime(cur);
            }
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        // Interaction Listeners
        document.getElementById('player-shield').addEventListener('click', (e) => {
            if (player.getPlayerState() === 1) player.pauseVideo();
            else player.playVideo();
            toggleControls(true);
        });

        document.getElementById('main-play-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            if (player.getPlayerState() === 1) player.pauseVideo();
            else player.playVideo();
        });

        document.getElementById('progress-container').addEventListener('click', (e) => {
            e.stopPropagation();
            const rect = e.currentTarget.getBoundingClientRect();
            player.seekTo((e.clientX - rect.left) / rect.width * player.getDuration());
        });

        document.getElementById('mute-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            isMuted = !isMuted;
            isMuted ? player.mute() : player.unMute();
            document.getElementById('vol-high').classList.toggle('hidden', isMuted);
            document.getElementById('vol-mute').classList.toggle('hidden', !isMuted);
        });

        document.getElementById('speed-select').addEventListener('change', (e) => {
            player.setPlaybackRate(parseFloat(e.target.value));
        });

        document.getElementById('fs-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            const wrap = document.getElementById('player-wrapper');
            if (!document.fullscreenElement) {
                if (wrap.requestFullscreen) wrap.requestFullscreen();
                else if (wrap.webkitRequestFullscreen) wrap.webkitRequestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Watermark & Auth
        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) return window.location.assign('login.html');
            userEmail = session.user.email;
            const wm = document.getElementById('watermark');
            wm.innerText = userEmail;
            setInterval(() => {
                const wrap = document.getElementById('player-wrapper');
                wm.style.left = Math.random() * (wrap.clientWidth - 100) + 'px';
                wm.style.top = Math.random() * (wrap.clientHeight - 40) + 'px';
            }, 5000);
        }

        // Script Injection
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);
        init();

        // Listen for touch to show controls on mobile
        document.getElementById('player-wrapper').addEventListener('touchstart', () => toggleControls(true));
    </script>
</body>
</html>
