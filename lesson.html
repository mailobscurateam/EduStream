<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lesson Player | EduStream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d' }
                    }
                }
            }
        };

        const applyTheme = (theme) => {
            if (theme === 'dark') document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
            localStorage.setItem('theme', theme);
        };
        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        applyTheme(savedTheme);
    </script>
    <style>
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: #000;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
        }

        /* Fullscreen specific adjustments */
        .video-container:fullscreen {
            padding-top: 0;
            width: 100vw;
            height: 100vh;
            border-radius: 0;
        }

        #youtube-player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: transparent;
        }
        
        .custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            min-height: 80px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            z-index: 50; /* Higher z-index to stay above player on mobile */
            display: flex;
            flex-direction: column;
            padding: 10px 20px calc(10px + env(safe-area-inset-bottom)) 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        /* Show controls on hover or when video is paused */
        .video-container:hover .custom-controls,
        .video-container.paused .custom-controls,
        .video-container.touch-active .custom-controls {
            opacity: 1;
            pointer-events: auto;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.2);
            cursor: pointer;
            margin-bottom: 12px;
            position: relative;
            border-radius: 3px;
        }
        
        .progress-bar {
            height: 100%;
            background: #22c55e;
            width: 0%;
            border-radius: 3px;
            position: relative;
        }

        #watermark {
            position: absolute;
            z-index: 20;
            pointer-events: none;
            user-select: none;
            opacity: 0.25;
            font-size: 14px;
            font-weight: 800;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            white-space: nowrap;
            transition: all 5s linear;
        }

        input[type=range] {
            accent-color: #22c55e;
        }

        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fade-in 0.6s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen font-sans text-slate-900 dark:text-slate-100">

    <header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200/60 dark:border-slate-800/60 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="goBack()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <span class="font-bold text-sm tracking-tight hidden sm:block">Back to Curriculum</span>
            </div>
            <div class="flex items-center gap-4 overflow-hidden">
                <span id="header-lesson-title" class="text-sm font-bold text-brand-600 dark:text-brand-400 truncate max-w-[200px] sm:max-w-md">Loading lesson...</span>
            </div>
            <div class="w-10"></div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-12 animate-fade-in">
        <div id="player-wrapper" class="video-container group paused touch-active">
            <div id="youtube-player"></div>
            <!-- Clickable overlay to toggle play/pause -->
            <div class="video-overlay" id="player-shield" onclick="handleContainerClick()"></div>
            <div id="watermark">User ID Tracking...</div>

            <div class="custom-controls" onclick="event.stopPropagation()">
                <div class="progress-container" id="progress-container" onclick="seek(event)">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>

                <div class="flex items-center justify-between text-white">
                    <div class="flex items-center gap-4">
                        <button onclick="togglePlay()" class="hover:text-brand-500 transition-colors p-2">
                            <svg id="ctrl-play-icon" class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            <svg id="ctrl-pause-icon" class="w-7 h-7 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        </button>

                        <div class="flex items-center gap-2 group/vol">
                            <button onclick="toggleMute()" class="hover:text-brand-500 transition-colors">
                                <svg id="vol-high" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/></svg>
                                <svg id="vol-mute" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" /></svg>
                            </button>
                            <input type="range" id="vol-slider" min="0" max="100" value="100" oninput="setVolume(this.value)" class="w-16 sm:w-0 sm:group-hover/vol:w-20 transition-all overflow-hidden h-1">
                        </div>
                        <span class="text-xs font-mono font-bold"><span id="curr-time">0:00</span> / <span id="dur-time">0:00</span></span>
                    </div>

                    <div class="flex items-center gap-5">
                        <select onchange="setPlaybackSpeed(this.value)" class="bg-transparent text-xs font-bold border-none outline-none cursor-pointer hover:text-brand-500 appearance-none">
                            <option value="0.5" class="bg-slate-900">0.5x</option>
                            <option value="1" selected class="bg-slate-900">1x</option>
                            <option value="1.5" class="bg-slate-900">1.5x</option>
                            <option value="2" class="bg-slate-900">2x</option>
                        </select>
                        <button onclick="toggleFullscreen()" class="hover:text-brand-500 transition-colors p-2">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-8">
            <h1 id="display-title" class="text-3xl font-black tracking-tight text-slate-900 dark:text-white">Loading Lesson Content...</h1>
            <div class="flex items-center gap-2 mt-2">
                <span id="lesson-id-badge" class="px-2 py-0.5 bg-brand-500 text-white rounded text-[10px] font-bold uppercase tracking-wider hidden">ID: ...</span>
                <p class="text-slate-500 dark:text-slate-400 font-medium">Internal Secure Learning Player • EduStream v2.0</p>
            </div>
        </div>
    </main>

    <script>
        const CONFIG = {
            SUPABASE_URL: 'https://pkqpvnrtxtqlngwtfnhy.supabase.co',
            SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrcXB2bnJ0eHRxbG5nd3Rmbmh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzNzQxNTUsImV4cCI6MjA4NTk1MDE1NX0.wrYYlIzt1slOXkbUAqAaSI1bA9xJ2N8QhNHSRJIkZR0',
            SHEET_ID: '1_ALK5Bkz-D0LIia1fLc_NmA12Zm8KRylJNYjnfhPezM',
            API_KEY: 'AIzaSyDzdiDMtiY250DS-lDuZeIZOocw9oqMlhM'
        };

        const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        const urlParams = new URLSearchParams(window.location.search);
        const lessonIdFromUrl = urlParams.get('id');

        let player;
        let userEmail = "Guest Student";
        let isMuted = false;
        let isApiReady = false;
        let videoIdToLoad = null;
        let controlsTimeout;

        function extractVideoId(url) {
            if (!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        async function fetchLessonDetails() {
            if (!lessonIdFromUrl) {
                document.getElementById('display-title').innerText = "Error: No Lesson ID provided.";
                return;
            }

            try {
                const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/Sheet3!A:I?key=${CONFIG.API_KEY}`);
                const data = await response.json();
                
                if (data.values) {
                    const row = data.values.find(r => r[8] === lessonIdFromUrl);
                    if (row) {
                        const lessonTitle = row[2] || "Untitled Module";
                        const videoUrl = row[5]; 
                        
                        document.getElementById('display-title').innerText = lessonTitle;
                        document.getElementById('header-lesson-title').innerText = lessonTitle;
                        
                        const badge = document.getElementById('lesson-id-badge');
                        badge.innerText = `ID: ${lessonIdFromUrl}`;
                        badge.classList.remove('hidden');

                        videoIdToLoad = extractVideoId(videoUrl);
                        checkReady();
                    }
                }
            } catch (err) {
                console.error("Fetch Error:", err);
            }
        }

        window.onYouTubeIframeAPIReady = () => {
            isApiReady = true;
            checkReady();
        };

        function checkReady() {
            if (isApiReady && videoIdToLoad) {
                createPlayer(videoIdToLoad);
            }
        }

        function createPlayer(vId) {
            if (player) return;
            player = new YT.Player('youtube-player', {
                videoId: vId,
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'disablekb': 1,
                    'rel': 0,
                    'modestbranding': 1,
                    'fs': 0,
                    'iv_load_policy': 3
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady() {
            document.getElementById('dur-time').innerText = formatTime(player.getDuration());
            setInterval(updateProgressBar, 500);
        }

        function onPlayerStateChange(event) {
            const container = document.getElementById('player-wrapper');
            const playIcon = document.getElementById('ctrl-play-icon');
            const pauseIcon = document.getElementById('ctrl-pause-icon');
            
            if (event.data === YT.PlayerState.PLAYING) {
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
                container.classList.remove('paused');
                hideControlsDelay();
            } else {
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
                container.classList.add('paused');
                showControls();
            }
        }

        function handleContainerClick() {
            showControls();
            togglePlay();
        }

        function showControls() {
            const container = document.getElementById('player-wrapper');
            container.classList.add('touch-active');
            clearTimeout(controlsTimeout);
            if (player && player.getPlayerState() === YT.PlayerState.PLAYING) {
                hideControlsDelay();
            }
        }

        function hideControlsDelay() {
            clearTimeout(controlsTimeout);
            controlsTimeout = setTimeout(() => {
                const container = document.getElementById('player-wrapper');
                if (player && player.getPlayerState() === YT.PlayerState.PLAYING) {
                    container.classList.remove('touch-active');
                }
            }, 3000);
        }

        function updateProgressBar() {
            if (player && typeof player.getCurrentTime === 'function') {
                const currTime = player.getCurrentTime();
                const duration = player.getDuration();
                if (duration > 0) {
                    const percent = (currTime / duration) * 100;
                    document.getElementById('progress-bar').style.width = percent + '%';
                    document.getElementById('curr-time').innerText = formatTime(currTime);
                }
            }
        }

        function togglePlay() {
            if (!player) return;
            const state = player.getPlayerState();
            if (state === YT.PlayerState.PLAYING) player.pauseVideo();
            else player.playVideo();
        }

        function seek(event) {
            if (!player) return;
            const rect = document.getElementById('progress-container').getBoundingClientRect();
            const pos = (event.clientX - rect.left) / rect.width;
            player.seekTo(pos * player.getDuration());
            showControls();
        }

        function setVolume(val) {
            if (!player) return;
            player.setVolume(val);
            player.unMute();
            isMuted = false;
            updateVolIcons();
        }

        function toggleMute() {
            if (!player) return;
            if (player.isMuted()) { player.unMute(); isMuted = false; }
            else { player.mute(); isMuted = true; }
            updateVolIcons();
        }

        function updateVolIcons() {
            document.getElementById('vol-high').classList.toggle('hidden', isMuted);
            document.getElementById('vol-mute').classList.toggle('hidden', !isMuted);
        }

        function setPlaybackSpeed(speed) {
            if (player) player.setPlaybackRate(parseFloat(speed));
        }

        function toggleFullscreen() {
            const elem = document.getElementById('player-wrapper');
            if (!document.fullscreenElement) {
                if (elem.requestFullscreen) elem.requestFullscreen();
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
                else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        function formatTime(time) {
            if (isNaN(time)) return "0:00";
            time = Math.round(time);
            const m = Math.floor(time / 60);
            const s = time % 60;
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        async function checkAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) return window.location.assign('login.html');
            userEmail = session.user.email;
            initWatermark();
            fetchLessonDetails();
        }

        function initWatermark() {
            const watermark = document.getElementById('watermark');
            watermark.innerText = userEmail + " - Secure Access";
            const move = () => {
                const container = document.getElementById('player-wrapper');
                if (!container) return;
                watermark.style.left = Math.floor(Math.random() * (container.clientWidth - 150)) + 'px';
                watermark.style.top = Math.floor(Math.random() * (container.clientHeight - 100)) + 'px';
            };
            move();
            setInterval(move, 10000);
        }

        function goBack() { window.history.back(); }

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        checkAuth();

        // Listen for fullscreen change to ensure controls are handled correctly
        document.addEventListener('fullscreenchange', showControls);
    </script>
</body>
</html>
