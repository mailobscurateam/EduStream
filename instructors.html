<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Instructors | EduStream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d' }
                    }
                }
            }
        };

        const applyTheme = (theme) => {
            if (theme === 'dark') document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
            localStorage.setItem('theme', theme);
        };
        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        applyTheme(savedTheme);
    </script>
    <style>
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { animation: fade-up 0.5s ease-out forwards; }
        
        /* Hide content until auth check passes */
        body { opacity: 0; transition: opacity 0.3s ease; }
        body.auth-checked { opacity: 1; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen font-sans text-slate-900 dark:text-slate-100">

    <!-- Header -->
    <header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200/60 dark:border-slate-800/60 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="index.html" class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-brand-500 rounded-lg flex items-center justify-center text-white font-bold">E</div>
                    <span class="font-bold text-lg tracking-tight hidden sm:block">EduStream</span>
                </a>
            </div>
            <div class="flex items-center gap-6">
                <nav class="hidden md:flex items-center gap-6 text-sm font-semibold text-slate-600 dark:text-slate-400">
                    <a href="courses.html" class="hover:text-brand-500 transition-colors">Courses</a>
                    <a href="instructors.html" class="text-brand-500">Instructors</a>
                </nav>
                <div class="flex items-center gap-3 border-l border-slate-200 dark:border-slate-800 ml-2 pl-6">
                    <button onclick="toggleTheme()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-colors">
                        <svg id="theme-icon-dark" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 9H3m3.343-5.657l-.707.707m12.728 12.728l-.707.707M6.343 17.657l-.707-.707M17.657 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                        <svg id="theme-icon-light" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    </button>
                    <button onclick="handleLogout()" class="text-xs font-bold text-red-500 hover:text-red-600 transition-colors">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <!-- Hero Section -->
        <div class="mb-12">
            <h1 class="text-4xl md:text-5xl font-black tracking-tight text-slate-900 dark:text-white mb-4">Meet Our Experts</h1>
            <p class="text-lg text-slate-600 dark:text-slate-400 max-w-2xl">Learn from industry leaders and academic pioneers who are passionate about sharing their knowledge.</p>
        </div>

        <!-- Search & Filter Bar -->
        <div class="flex flex-col md:flex-row gap-4 mb-10 items-center justify-between">
            <div class="relative w-full md:w-96">
                <input type="text" id="instructorSearch" oninput="filterInstructors()" placeholder="Search instructors by name or specialty..." 
                    class="w-full pl-12 pr-4 py-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl focus:ring-2 focus:ring-brand-500 outline-none transition-all shadow-sm">
                <svg class="w-5 h-5 absolute left-4 top-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>
            <div class="flex items-center gap-2 text-sm font-medium text-slate-500">
                <span id="instructorCount">0</span> instructors found
            </div>
        </div>

        <!-- Instructor Grid -->
        <div id="instructorGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Loading States -->
            <div class="h-64 bg-slate-200 dark:bg-slate-800 animate-pulse rounded-3xl"></div>
            <div class="h-64 bg-slate-200 dark:bg-slate-800 animate-pulse rounded-3xl"></div>
            <div class="h-64 bg-slate-200 dark:bg-slate-800 animate-pulse rounded-3xl"></div>
            <div class="h-64 bg-slate-200 dark:bg-slate-800 animate-pulse rounded-3xl"></div>
        </div>
    </main>

    <script>
        const CONFIG = {
            SUPABASE_URL: 'https://pkqpvnrtxtqlngwtfnhy.supabase.co',
            SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrcXB2bnJ0eHRxbG5nd3Rmbmh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzNzQxNTUsImV4cCI6MjA4NTk1MDE1NX0.wrYYlIzt1slOXkbUAqAaSI1bA9xJ2N8QhNHSRJIkZR0',
            SHEET_ID: '1_ALK5Bkz-D0LIia1fLc_NmA12Zm8KRylJNYjnfhPezM',
            API_KEY: 'AIzaSyDzdiDMtiY250DS-lDuZeIZOocw9oqMlhM'
        };

        const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let allInstructors = [];

        async function checkAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                // Not logged in - redirect to login
                window.location.assign('login.html');
            } else {
                // Logged in - show page and fetch data
                document.body.classList.add('auth-checked');
                fetchInstructors();
            }
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            window.location.assign('login.html');
        }

        async function fetchInstructors() {
            try {
                const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/Teachers!A:I?key=${CONFIG.API_KEY}`);
                const data = await response.json();
                
                if (data.values && data.values.length > 1) {
                    allInstructors = data.values.slice(1).map(row => ({
                        id: row[0], 
                        name: row[1] || 'Unknown Instructor',
                        specialty: row[2] || 'Expert',
                        photo: row[3] || `https://ui-avatars.com/api/?name=${encodeURIComponent(row[1] || 'U')}&background=22c55e&color=fff`,
                        bio: row[4] || 'No biography provided.'
                    }));
                    renderInstructors(allInstructors);
                } else {
                    document.getElementById('instructorGrid').innerHTML = `
                        <div class="col-span-full py-20 text-center">
                            <p class="text-slate-500">No instructors found in the database.</p>
                        </div>
                    `;
                }
            } catch (err) {
                console.error("Fetch Error:", err);
                document.getElementById('instructorGrid').innerHTML = `
                    <div class="col-span-full py-20 text-center text-red-500">
                        Failed to load instructor data. Please try again later.
                    </div>
                `;
            }
        }

        function renderInstructors(list) {
            const grid = document.getElementById('instructorGrid');
            document.getElementById('instructorCount').innerText = list.length;
            
            grid.innerHTML = list.map((teacher, index) => `
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl p-6 hover:shadow-xl hover:-translate-y-1 transition-all group animate-fade-up" style="animation-delay: ${index * 50}ms">
                    <div class="flex flex-col items-center text-center">
                        <div class="relative mb-4">
                            <div class="absolute inset-0 bg-brand-500 blur-2xl opacity-0 group-hover:opacity-20 transition-opacity"></div>
                            <img src="${teacher.photo}" alt="${teacher.name}" class="relative w-24 h-24 rounded-2xl object-cover border-4 border-slate-50 dark:border-slate-800" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(teacher.name)}&background=22c55e&color=fff'">
                        </div>
                        <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-1">${teacher.name}</h3>
                        <span class="text-xs font-bold text-brand-500 uppercase tracking-widest mb-4">${teacher.specialty}</span>
                        <p class="text-sm text-slate-500 dark:text-slate-400 line-clamp-3 mb-6 leading-relaxed">
                            ${teacher.bio}
                        </p>
                        <button onclick="goToProfile('${teacher.id}')" class="w-full py-3 bg-slate-100 dark:bg-slate-800 hover:bg-brand-500 hover:text-white text-slate-900 dark:text-white text-sm font-bold rounded-xl transition-all">
                            View Profile
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function goToProfile(instructorId) {
            if (!instructorId) return;
            window.location.href = `course.html?id=${encodeURIComponent(instructorId)}`;
        }

        function filterInstructors() {
            const query = document.getElementById('instructorSearch').value.toLowerCase();
            const filtered = allInstructors.filter(t => 
                t.name.toLowerCase().includes(query) || 
                t.specialty.toLowerCase().includes(query)
            );
            renderInstructors(filtered);
        }

        function toggleTheme() {
            const current = document.documentElement.classList.contains('dark') ? 'light' : 'dark';
            applyTheme(current);
        }

        // Initialize with auth check
        window.onload = checkAuth;
    </script>
</body>
</html>
